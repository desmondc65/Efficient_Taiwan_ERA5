# Conda environment for the full pipeline.
#   conda env create -f environment.yml
#   conda activate era5tw
# PyTorch is installed via pip afterwards (see requirements-torch.txt) so you
# control the CUDA build.
name: era5tw
channels:
  - conda-forge
dependencies:
  - python=3.11
  - xarray>=2024.3.0
  - "zarr>=2.16,<3"
  - numcodecs>=0.12.1
  - dask>=2024.3.0
  - netcdf4>=1.6.5
  - pyyaml>=6.0
  - pandas>=2.0
  - "numpy>=1.24,<2.1"
  - matplotlib>=3.7
  - tqdm>=4.66
  - psutil>=5.9
  - pip
  - pip:
      - cdsapi>=0.7.4
